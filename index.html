<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mountain Layers</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main>
    <h1>Mountain Layers</h1>
    <p class="subtitle">Upload a mountain photo. Get printable silhouette layers for paper craft.</p>

    <section class="upload-section">
      <label class="file-label" for="file-input">
        Choose image
        <input type="file" id="file-input" accept="image/*">
      </label>
      <span id="file-name">no file chosen</span>
    </section>

    <section class="controls" id="controls" hidden>
      <div class="preview-wrap">
        <canvas id="preview-canvas"></canvas>
        <p class="hint">adjust threshold until the mountain outline turns blue</p>
      </div>

      <div class="sliders">
        <label>
          Sky threshold
          <input type="range" id="threshold" min="80" max="240" value="180">
          <span id="threshold-val">180</span>
        </label>
        <label>
          Number of layers
          <input type="range" id="num-layers" min="2" max="8" value="5">
          <span id="num-layers-val">5</span>
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="use-color">
          Use original colors (uncheck for black silhouette)
        </label>
      </div>

      <button id="generate-btn">Generate layers</button>
    </section>

    <section id="output" hidden>
      <div class="output-header">
        <h2>Layers</h2>
        <button id="print-all-btn">Print all</button>
      </div>
      <p class="hint">
        Stack from layer 1 (back) to layer <span id="last-layer-label">5</span> (front).
        Cut along the silhouette edge of each layer.
      </p>
      <div id="layers-grid"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
